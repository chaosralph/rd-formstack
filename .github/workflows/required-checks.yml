name: Required Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  php_lint:
    name: php-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: PHP syntax lint
        run: bash scripts/ci/php-lint.sh

  smoke_routes:
    name: smoke-routes
    runs-on: ubuntu-latest
    needs: php_lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Route smoke test
        run: bash scripts/ci/smoke-routes.sh
