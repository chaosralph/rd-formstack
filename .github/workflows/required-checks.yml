name: Required Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  qa_gate:
    name: qa-gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Run QA gate (strict, includes header/host regression checks)
        env:
          RD_QA_STRICT: '1'
          RD_QA_RUN_A11Y_SMOKE: '1'
          RD_QA_RUN_RESPONSIVE: '0'
        run: bash scripts/ci/qa-gate.sh
